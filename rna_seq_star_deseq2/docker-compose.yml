# rna-seq-star-deseq2 simulated cluster — build, single-node, multi-node.
#
# Single-node (4-sample yeast benchmark, Snakemake + --use-conda):
#   docker compose run --rm validate
#
# Multi-node cluster (three independent project dirs fanned out via SSH):
#   docker compose up --abort-on-container-exit --exit-code-from head head
#
# NOTE: first run materialises the per-rule conda envs (STAR, samtools,
# DESeq2, multiqc, …). Expect an extra 10-15 minutes of solve time on
# the first `validate`.

services:

  validate:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: sci-rna-seq-star-deseq2-deploy:latest
    command:
      - bash
      - -c
      - |
        /opt/run_rnaseq.sh /output/run && \
        echo '=== SINGLE-NODE TEST PASSED ==='
    volumes:
      - output:/output

  head:
    image: sci-rna-seq-star-deseq2-deploy:latest
    hostname: head
    depends_on:
      worker1:
        condition: service_healthy
      worker2:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        /usr/sbin/sshd && \
        /opt/run_rnaseq.sh /output/head &
        ssh -o StrictHostKeyChecking=no worker1 "/opt/run_rnaseq.sh /output/worker1" &
        ssh -o StrictHostKeyChecking=no worker2 "/opt/run_rnaseq.sh /output/worker2" &
        wait && \
        find /output/head    -path '*/results/diffexp/*.diffexp.symbol.tsv' -print -quit | grep -q . && \
        find /output/worker1 -path '*/results/diffexp/*.diffexp.symbol.tsv' -print -quit | grep -q . && \
        find /output/worker2 -path '*/results/diffexp/*.diffexp.symbol.tsv' -print -quit | grep -q . && \
        echo '=== CLUSTER TEST PASSED ==='
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker1:
    image: sci-rna-seq-star-deseq2-deploy:latest
    hostname: worker1
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker2:
    image: sci-rna-seq-star-deseq2-deploy:latest
    hostname: worker2
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

networks:
  mpi-net:

volumes:
  output:
