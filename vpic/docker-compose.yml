# VPIC-Kokkos simulated cluster — build, single-node, and multi-node tests.
#
# The output volume is shared across head and workers so the compiled deck
# binary is accessible to all MPI ranks.
#
# Single-node (2 ranks, 1 container):
#   docker compose run --rm validate
#
# Multi-node cluster (head + 2 workers):
#   docker compose up --abort-on-container-exit --exit-code-from head head

services:

  validate:
    build:
      context: .
      dockerfile: Dockerfile
    image: sci-vpic:latest
    command:
      - bash
      - -c
      - |
        mkdir -p /output && \
        cp /opt/vpic-kokkos/sample/harris /output/harris.cxx && \
        cd /output && \
        /opt/vpic-kokkos/build/bin/vpic harris.cxx && \
        mpirun -np 2 --oversubscribe --allow-run-as-root \
            --mca btl tcp,self --mca oob_tcp_if_exclude lo \
            /output/harris.Linux && \
        echo '=== SINGLE-NODE TEST PASSED ==='
    volumes:
      - output:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  head:
    image: sci-vpic:latest
    hostname: head
    depends_on:
      worker1:
        condition: service_healthy
      worker2:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        /usr/sbin/sshd && \
        mkdir -p /output && \
        cp /opt/vpic-kokkos/sample/harris /output/harris.cxx && \
        cd /output && \
        /opt/vpic-kokkos/build/bin/vpic harris.cxx && \
        mpirun -np 4 --allow-run-as-root \
            --host head:2,worker1:1,worker2:1 \
            --mca btl tcp,self --mca oob_tcp_if_exclude lo \
            /output/harris.Linux && \
        echo '=== CLUSTER TEST PASSED ==='
    volumes:
      - output:/output
    networks:
      - mpi-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker1:
    image: sci-vpic:latest
    hostname: worker1
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker2:
    image: sci-vpic:latest
    hostname: worker2
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  mpi-net:

volumes:
  output:
