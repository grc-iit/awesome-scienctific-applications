# PyFLEXTRKR simulated cluster — build, single-node, multi-node tests.
#
# Single-node (idealized MCS demo, serial, one container):
#   docker compose run --rm validate
#
# Multi-node cluster (three independent demo runs, one per node over SSH):
#   docker compose up --abort-on-container-exit --exit-code-from head head

services:

  validate:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: sci-pyflextrkr-deploy:latest
    command:
      - bash
      - -c
      - |
        /opt/run_demo.sh demo_mcs_tbpf_idealized /output/data && \
        echo '=== SINGLE-NODE TEST PASSED ==='
    volumes:
      - output:/output

  head:
    image: sci-pyflextrkr-deploy:latest
    hostname: head
    depends_on:
      worker1:
        condition: service_healthy
      worker2:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        /usr/sbin/sshd && \
        # Fan out the idealized demo across head + 2 workers; each node
        # runs the same demo against its own scratch dir under /output.
        /opt/run_demo.sh demo_mcs_tbpf_idealized /output/head &
        ssh -o StrictHostKeyChecking=no worker1 \
          "/opt/run_demo.sh demo_mcs_tbpf_idealized /output/worker1" &
        ssh -o StrictHostKeyChecking=no worker2 \
          "/opt/run_demo.sh demo_mcs_tbpf_idealized /output/worker2" &
        wait && \
        test -d /output/head/mcs_tbpf/idealized/test4/stats && \
        test -d /output/worker1/mcs_tbpf/idealized/test4/stats && \
        test -d /output/worker2/mcs_tbpf/idealized/test4/stats && \
        echo '=== CLUSTER TEST PASSED ==='
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker1:
    image: sci-pyflextrkr-deploy:latest
    hostname: worker1
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker2:
    image: sci-pyflextrkr-deploy:latest
    hostname: worker2
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

networks:
  mpi-net:

volumes:
  output:
