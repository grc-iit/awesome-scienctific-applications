# PyFLEXTRKR simulated cluster — build, single-node, multi-node tests.
#
# Single-node (idealized MCS demo, serial, one container):
#   docker compose run --rm validate
#
# Multi-node cluster (Dask-MPI distributed across head + 2 workers):
#   docker compose up --abort-on-container-exit --exit-code-from head head
#
# The multi-node test launches ONE `mpirun` from the head container that
# spans all three containers over SSH. Ranks are allocated as:
#   rank 0 = Dask scheduler, rank 1 = client, ranks 2..N-1 = workers.
# This was validated bare-metal on Slurm (see VALIDATION.md).

services:

  validate:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: sci-pyflextrkr-deploy:latest
    command:
      - bash
      - -c
      - |
        /opt/run_demo.sh demo_mcs_tbpf_idealized /output/data && \
        echo '=== SINGLE-NODE TEST PASSED ==='
    volumes:
      - output:/output

  head:
    image: sci-pyflextrkr-deploy:latest
    hostname: head
    depends_on:
      worker1:
        condition: service_healthy
      worker2:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        /usr/sbin/sshd && \
        # One mpirun spans head + worker1 + worker2. 6 total ranks:
        # 1 Dask scheduler + 1 client + 4 workers (2 per worker node +
        # 2 on head). Shared volume /output is visible to all containers.
        /opt/run_demo_multinode.sh /output/cluster head,worker1,worker2 6 && \
        echo '=== CLUSTER TEST PASSED ==='
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker1:
    image: sci-pyflextrkr-deploy:latest
    hostname: worker1
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

  worker2:
    image: sci-pyflextrkr-deploy:latest
    hostname: worker2
    command: /usr/sbin/sshd -D
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 3s
    volumes:
      - output:/output
    networks:
      - mpi-net

networks:
  mpi-net:

volumes:
  output:
